front:
  text: 金籙大齊𥙷職說戒儀
  hash: sha256:16e7fa014938325986856898dd656e7b31e97a5cc925d8752b4b603d7e438345
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0170_HFL_000-001a, image: hfl/0266/0266-046.png}
body:
  text: 侍職立師寶前啓白建齊行道威儀肅列於三元分任設官俯仰聿符於四極諸天臨軒而校録衆真侍座以監臨職守攸司步趨宜謹況玊律備監攝之令而金科垂銓舉之文宜罄厥誠登瑶壇而恭事各典所署敷瓊笈以宣揚撰授母輕鑒觀有翼先𥙷一人為高功其職也道德內充威儀外備天人歸向鬼神具瞻躡景飛晨承顔宣德惠周三界禮越衆官今請某充直壇以職簡授之跪受簡三拜次𥙷一人為都講其職也洞輔該通法度明練贊唱儀矩領䄂班聮玄壇步趨升座講說昭符國命默契天心今以某充直壇以職簡授之跪受簡三拜次𥙷一人為監齊其職也總握憲章典領科禁紏正壇職振肅朝綱周密察非從容授簡有嚴有翼毋濫毋隳今以某充直壇以職簡授之跪受簡三拜次𥙷一人為侍經其職也嚴潔几䄄整齊卷軸開函啓奏收櫝敷陳調和衆音表儀庶職觀聽允睦幽顯交歡今以某充直壇以職簡授之跪受簡三拜次𥙷一人為侍香其職也精飾鼎𢑴嚴潔案席巡行爇炷始終芬芳玄鑒昭彰丹誠露逹毋或中絶有越初忱今以某充直壇以職簡授之跪受簡三拜次𥙷一人為侍燈其職也整辦缸篝精嚴燈燭高下照徹內外輝華際夜續明乘晨收焰光明道境輝耀齊壇今以某充直壇以職簡授之跪受簡三拜如上所𥙷皆道參洞輔學貫樞機通曉齊科非白簡𥘉真之輩練明經法匪黃冠後學之流惟黜陟之既明宜賢否之勿溷以德相尚豈云遷就於人情惟道為尊庶獲敬承於朝命各敦素守共暢玄綱有三官五帝之檢身有九府四司之臨汝天威惕若壇禁森如毋自冒於科條庶克逃於憲律一如靈寶玄壇律令智慧頌智慧生戒根真道戒為主三寶由是興高仙所崇授泛此不死舟倏歘濟大有當此說戒時諸天皆稽首轉壇高功西面壇衆東面各伏地衆官等各各首體投地默禮十方各一拜從北為始禮足周回十方虔誠受戒高功說戒衆官長跪元始天尊昔以開皇元年七月一日午時於西那玊國鬱剎之山浮羅之嶽長桑林中授太上道君靈寶智慧上品大戒法文是時道君北向五體投地回心十方向東而伏天尊是時告道君曰今當普宣法音開悟一切解災却禍請福祈安夫修齊行道皆當一心奉遵十戒專精默念洞思自然勿得雜想撓亂形神能如是者便當靜聽下靜第一戒者心不惡妬毋生隂賊檢口悛過想念如法第二戒者守仁不殺愍濟羣生慈愛廣救潤及一切第三戒者守正讓義不淫不盜常行善念損已濟物第四戒者不欲不色心毋放蕩正潔守愼行無㸃汚第五戒者口無惡言言無華綺內外中直不犯口過第六戒者斷酒節行調和性氣神不損傷毋犯衆惡第七戒者不得嫉人勝己爭競功名每事遜讓退身度人第八戒者不得評論經教訾毀聖文躬心承教常如對神第九戒者不得口舌相非評詳四輩讒惡妬忌傷損神氣第十戒者舉動施為平等一心人和神穆行常使然已上十戒能持否衆和能持天尊言修奉十戒每合天心常行大慈願為一切普度厄難慊慊尊教不得中怠寧守善而立不違道而生於是不退可得諸天所護萬神所敬長齊奉戒自得度世天尊言道尊法妙人身亦貴故道開法門遺戒經文以度人身人身既度上與道同宜為精行持齊奉戒夷心靜默志念分明一意歸向專想不二滌蕩六腑過中不味內外清虛每合自然是其齊日拈香啓願應心上徹四天司邏十部威神即下履行觀聽法音監映爾心如戒行道皆列功諸天禍福立彰道不負人勤行諦受勿使魔言天尊曰建齊行道四天帝王皆駕雲輿緑軿八景玊輿侍從真人玊童玊女手把華幡前導鳳歌後從鈞天白鶴獅子嘯歌嗈嗈燒香散花浮空而來瞻禮行道觀聽法音天王下降萬靈朝焉如是則上副宸衷周隆齊福豈可不盡其法也當先授十戒後方行道庠序雅步靜心間意坐起卧息不離儀格天真歡恱列言上清可謂得道方寸之間矣奉戒頌道為無心宗一切作福田立功無定準本願各由人虛已應衆生注心莫不均大聖崇正教亦由雨降天高陵靡不周常卑故成淵海為百川王是能舍龍鱗萬劫保智用豈但在厥年奉戒不暫虧世世善結緣精思念大乘㑹當體道真歸位衆官平坐宣禁戒儀齊法清虛威禁至重同齊學士務契威儀太極法師具存禁戒今當宣演開子未聞監齊紏率衆官面受罰簡有違科禁心罰無停夫修齊之日須令內外寂靜毋使香油缺乏法用有虧道士登壇各齎巾褐版履不得臨時交換彼我有缺勿得牽引非已之服道士登齊起坐皆當白監齊禮法師一拜禮香三拜而去還亦如之若到齊堂履屨不整罰禮二十拜若坐起不庠序罰禮五拜若不正坐罰禮五拜若臨行法事與外人交言罰禮二十拜若翻覆香火罰禮十拜若講及世務罰禮十拜若言語戲笑罰禮十拜若綺言低睡罰禮五拜若翻覆燈油罰禮四十拜若巾褐不整罰禮十拜若都講讃唱失儀罰禮二十拜若執紏見過不彈私隱罰禮六十拜若侍經不整飭高座觸物有缺罰禮十拜若侍香香煙中絶罰禮四十拜若侍燈燈火中滅罰禮二十拜若執事不相檢飭音聲高厲罰禮五十拜若聽經倚據不執簡罰禮十拜若不注念清虛心想怠倦為衆所覺罰禮三十拜若出入齊堂不關白監齊罰禮二十拜若垂髮馳步罰禮二十拜若讀經紊淆請問敗句罰禮三十拜若唱善聲不齊罰禮二十拜若升壇不洗手漱口罰禮二十拜若坐起揖遜失儀罰禮五拜若旋行不依次序及逆行罰禮十拜若起行來及還坐不禮經罰禮三拜若徑去者罰禮二十拜若臨燒香突行罰禮十拜若供辦觸事有缺罰禮二十拜若受關不啓上罰禮三十拜若齊次因起居逃遁不返為衆所紏罰禮一百拜若犯威儀彈罰不服者啓告三寶退出齊次若下座法師衆官法事有虧從一至三依科彈紏從三以上退出齊次執紏不彈與犯同罪若上座法師於事有虧從一至三依科彈紏從三以上斷功百日不得又在法座凡此禁戒皆玄都上宮明科舊格其惰慢其愆違建齊之時四天帝王天真上聖親降齊所瞻禮行道察其行藏觀其誠志若有過失即敕四司五帝詔下三官隨事紏舉加其菑考天尊大聖愍念世愚不欲加其譴賁故開紏罰之門使其知過而能改罪亦消焉受罰之者責己甘心恭敬聽命勿得飾非喧競干冒真靈如此則弘整紀綱解消殃咎落罪名於既往延福祉於將來得不翼翼小心虔虔夕惕若親奉大聖躬朝至尊則真靈感通福祥臻集登壇之士勉而戒之金籙大齊𥙷職說戒儀
